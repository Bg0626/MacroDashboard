// CONFIRMED PASTE FORMATS (from FormatosCopiaPega.xlsx — "paste as value"):
//
//  Col                    | Raw value   | Meaning       | Action
//  -----------------------|-------------|---------------|-------------------
//  YTW EUR/USD            | 0.052       | decimal       | ×100 → "5.20%"
//  Effective Duration     | 3.2         | years         | raw string, no round
//  Spread Duration        | 2.9         | years         | raw string, no round
//  IG/HY/NR/Float Rate    | 37, 16...   | % points      | direct + "%"
//  KIID Ongoing Charge    | 1.6         | % points      | direct + "%"
//  MTD / Mar / YTD        | 0.73447     | % points      | direct + "%"
//  2025/2024/2023/2022    | 5.47187     | % points      | direct + "%"
//  1 yr / 3 yrs           | 4.71476     | % points      | direct + "%"
//  Std Deviation 1yr      | 1.3257      | % points      | direct + "%"
//  Yield/Std Dev          | 3.92        | ratio         | raw 2 decimals
//  Last Update / Port Date| 46142       | Excel serial  | → date string
//  Inception Date         | 42585       | Excel serial  | → date string
//
// LOCALE NOTE: Excel in Chile (es-CL) uses comma as decimal separator.
// TSV paste gives "0,0263" not "0.0263". JS parseFloat("0,0263") = 0 — BUG.
// All numeric parsing must normalize commas to periods first.

// Normalize locale decimal: "0,0263" → "0.0263", "1.234,56" → "1234.56"
const toFloat = v => {
  if (v === null || v === undefined) return NaN;
  const s = String(v).trim();
  if (s === "" || s === "—") return NaN;
  // Detect thousands separator: if both . and , present, the last one is decimal
  if (s.includes(".") && s.includes(",")) {
    const lastDot = s.lastIndexOf(".");
    const lastComma = s.lastIndexOf(",");
    if (lastComma > lastDot) {
      // comma is decimal separator: "1.234,56" → remove dots, replace comma
      return parseFloat(s.replace(/\./g, "").replace(",", "."));
    } else {
      // dot is decimal separator: "1,234.56" → remove commas
      return parseFloat(s.replace(/,/g, ""));
    }
  }
  // Only comma (no dot): "0,0263" → "0.0263"
  if (s.includes(",") && !s.includes(".")) {
    return parseFloat(s.replace(",", "."));
  }
  return parseFloat(s);
};

// INFO DB values are stored as decimals (from openpyxl): 0.0547 = 5.47%
// fmtPct: formats INFO DB decimal → "+5.47%"
const fmtPct = (v, decimals = 2) => {
  const n = toFloat(v);
  if (isNaN(n)) return "—";
  return (n >= 0 ? "+" : "") + (n * 100).toFixed(decimals) + "%";
};

// fmtAum: formats AUM in millions
const fmtAum = (mill, ccy) => {
  const n = toFloat(mill);
  if (isNaN(n)) return "—";
  if (n >= 1000) return (n / 1000).toFixed(1) + " B " + (ccy || "");
  return n.toFixed(0) + " M " + (ccy || "");
};

// retColor: expects decimal (0.05 = 5%). INFO DB uses decimals.
const retColor = v => {
  const n = toFloat(v);
  if (isNaN(n)) return "#64748b";
  if (n >= 0.05) return "#22c55e";
  if (n >= 0.01) return "#86efac";
  if (n >= 0) return "#94a3b8";
  if (n >= -0.05) return "#fca5a5";
  return "#ef4444";
};

// fmtDate: converts Excel serial (46142) or datetime string → "YYYY-MM-DD"
const fmtDate = v => {
  if (!v && v !== 0) return "—";
  const s = String(v).trim();
  if (s === "") return "—";
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0, 10);
  if (s.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)) return s.slice(0, 10);
  const n = parseInt(s, 10);
  if (!isNaN(n) && n > 30000 && n < 60000) {
    const d = new Date(Date.UTC(1899, 11, 30) + n * 86400000);
    return d.toISOString().slice(0, 10);
  }
  return s.slice(0, 10);
};

// Monitor % point values: paste gives 0,73447 or 5,47187 (es-CL) — already in % pts.
// parseMonPct: returns number in % points using locale-safe toFloat, or null.
const parseMonPct = v => {
  if (v === null || v === undefined || v === "") return null;
  const n = toFloat(v);
  return isNaN(n) ? null : n;
};

// fmtMonPct: formats Monitor % point value → "+0.73%"
const fmtMonPct = v => {
  const n = parseMonPct(v);
  if (n === null) return "—";
  return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
};

// retColorMon: Monitor values in % pts → convert /100 for retColor
const retColorMon = v => {
  const n = parseMonPct(v);
  return n === null ? "#64748b" : retColor(n / 100);
};

// fmtMonYtw: YTW cols come as decimal (0,052 es-CL) → ×100 → "5.20%"
const fmtMonYtw = v => {
  const n = toFloat(v);
  if (isNaN(n) || v === "" || v === null || v === undefined) return "—";
  return (n * 100).toFixed(2) + "%";
};

// fmtRaw: show a value exactly as pasted, optionally appending a unit
const fmtRaw = (v, suffix = "") => {
  if (v === null || v === undefined || v === "") return "—";
  const s = String(v).trim();
  return s === "" ? "—" : s + suffix;
};

// Parse TSV paste from Excel
const parseTsv = text => {
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split("\t").map(h => h.trim().replace(/\r/g, ""));
  return lines.slice(1).map(line => {
    const vals = line.split("\t").map(v => v.trim().replace(/\r/g, ""));
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = vals[i] || "";
    });
    return obj;
  });
};

// Resolve any ISIN alias to principal
const resolveIsin = (isin, extraMap = {}) => {
  const q = isin.trim().toUpperCase();
  return extraMap[q] || BASE_ISIN_MAP[q] || q;
};
